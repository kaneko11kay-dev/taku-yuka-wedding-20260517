<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>BGM 自動再生サンプル</title>
  <style>
    /* 見た目に何も出さない（必要なら削除） */
    body { margin:0; height:100vh; }
  </style>
</head>
<body>
  <!-- BGM -->
  <audio id="bgm" src="quizStart.mp3" preload="auto" playsinline muted></audio>

  <script>
    const audio = document.getElementById('bgm');

    // ミュートで自動再生を試みる（ブラウザによっては成功する）
    audio.play().catch(()=>{ /* 自動再生がブロックされる */ });

    // 最初のユーザー操作（どこでも良い）でミュート解除してフェードイン再生
    function onFirstUserGesture() {
      // remove listeners
      document.removeEventListener('click', onFirstUserGesture);
      document.removeEventListener('touchstart', onFirstUserGesture);
      document.removeEventListener('keydown', onFirstUserGesture);

      // ミュート解除して再生（既に再生中なら音量だけ調整）
      audio.muted = false;
      audio.volume = 0.0;
      audio.play().catch(()=>{ /* 再生失敗時は無視 */ });

      // 簡単なフェードイン（0 → 0.8 に 1.5秒で）
      const target = 0.8;
      const duration = 1500;
      const step = 50;
      const increment = (target - audio.volume) / (duration / step);
      const fade = setInterval(() => {
        let v = Math.min(target, audio.volume + increment);
        audio.volume = v;
        if (v >= target) clearInterval(fade);
      }, step);
    }

    // どこでも良いので最初の操作を拾う
    document.addEventListener('click', onFirstUserGesture, { once: true });
    document.addEventListener('touchstart', onFirstUserGesture, { once: true });
    document.addEventListener('keydown', onFirstUserGesture, { once: true });

    // タブが非表示→表示に戻ったときに再生を試みる（ユーザーが既に許可していれば再生される）
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        audio.play().catch(()=>{});
      }
    });
  </script>
</body>
</html>

let current = 0, score = 0, answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showTitle() {
  document.getElementById('total-q-label').textContent = quizData.length;
  showScreen('screen-title');
}
function showEdit() { buildEditors(); showScreen('screen-edit'); }

// ── QUIZ ──
function startQuiz() {
  current = 0; score = 0;
  showScreen('screen-quiz');
  renderQuestion();
}
function renderQuestion() {
  const q = quizData[current];
  answered = false;
  const total = quizData.length;

  document.getElementById('progress-fill').style.width = ((current / total) * 100) + '%';
  document.getElementById('progress-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('question-num').textContent = `Q U E S T I O N ${String(current + 1).padStart(2,'0')}`;
  document.getElementById('question-text').textContent = q.q;

  const fb = document.getElementById('feedback');
  fb.classList.remove('show');
  document.getElementById('next-btn').style.display = 'none';

  // ヒントをリセット
  const hintPopup = document.getElementById('hint-popup');
  const hintBtn = document.getElementById('hint-btn');
  hintPopup.textContent = '';
  hintPopup.classList.remove('show');
  hintBtn.classList.remove('used');
  hintBtn.style.display = q.hint ? 'inline-flex' : 'none';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });
}
function showHint() {
  if (answered) return;
  const q = quizData[current];
  if (!q.hint) return;
  const hintPopup = document.getElementById('hint-popup');
  const hintBtn = document.getElementById('hint-btn');
  hintPopup.textContent = q.hint;
  hintPopup.classList.add('show');
  hintBtn.classList.add('used');
  hintBtn.textContent = '💡 ヒントを見る';
}
function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = quizData[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  const correct = idx === q.answer;
  if (correct) { score++; spawnPetals(); }

  const fb = document.getElementById('feedback');
  document.getElementById('feedback-verdict').textContent = correct ? '✨ 正解です！' : '惜しい！ 不正解です';
  document.getElementById('feedback-hint').textContent = q.explanation || '';
  fb.classList.add('show');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = current < quizData.length - 1 ? '次の問題へ →' : '結果を見る';
  nextBtn.style.display = 'block';
}
function nextQuestion() {
  current++;
  if (current < quizData.length) renderQuestion();
  else showResult();
}

// ── RESULT ──
function showResult() {
  showScreen('screen-result');
  const total = quizData.length;
  const pct = score / total;
  document.getElementById('score-display').innerHTML = `${score}<span> / ${total}</span>`;
  let title, msg;
  if (pct === 1) { title = "パーフェクト！"; msg = "おふたりのことを誰よりもよく知っていますね🌸\nこれからも仲良く見守ってください。"; }
  else if (pct >= 0.7){ title = "すごい！"; msg = "おふたりのことをよく知っていますね✨\nこれからも仲良く見守ってください。"; }
  else if (pct >= 0.4){ title = "なかなか！"; msg = "これからも仲良く見守ってください。"; }
  else { title = "まだまだいける！"; msg = "これからも仲良く見守ってください。"; }
  document.getElementById('result-title').textContent = title;
  document.getElementById('score-msg').innerHTML = msg.replace(/\n/g, "<br>");

  if (pct === 1) spawnPetals(30);
}

// ── PETALS ──
function spawnPetals(n = 12) {
  const symbols = ['🌸','🌿','✿','❀','🌼'];
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }, i * 80);
  }
}

// ── EDIT ──
function buildEditors() {
  const wrap = document.getElementById('editors');
  wrap.innerHTML = '';
  quizData.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'q-editor';
    div.innerHTML = `
      <label>問題 ${qi + 1}</label>
      <textarea rows="2" id="eq-${qi}">${q.q}</textarea>
      <div class="choices-edit">
        ${q.choices.map((c,ci) => `
          <div class="choice-row">
            <input type="text" id="ec-${qi}-${ci}" value="${c}">
            <input type="radio" class="correct-radio" name="correct-${qi}" id="er-${qi}-${ci}" value="${ci}" ${q.answer===ci?'checked':''}>
            <label for="er-${qi}-${ci}">正解</label>
          </div>
        `).join('')}
      </div>
      <div class="hint-row">
        <label style="margin-top:8px;">💡 ヒント（回答前に表示）</label>
        <input type="text" id="eh-${qi}" value="${q.hint||''}">
      </div>
      <div class="hint-row">
        <label style="margin-top:8px;">📖 解説（回答後に表示）</label>
        <input type="text" id="ex-${qi}" value="${q.explanation||''}">
      </div>
    `;
    wrap.appendChild(div);
  });
}
function saveEdit() {
  quizData.forEach((q, qi) => {
    q.q = document.getElementById(`eq-${qi}`).value.trim();
    q.choices.forEach((_, ci) => {
      q.choices[ci] = document.getElementById(`ec-${qi}-${ci}`).value.trim();
    });
    const checked = document.querySelector(`input[name="correct-${qi}"]:checked`);
    if (checked) q.answer = parseInt(checked.value);
    const hintEl = document.getElementById(`eh-${qi}`);
    q.hint = hintEl ? hintEl.value.trim() : '';
    const expEl = document.getElementById(`ex-${qi}`);
    q.explanation = expEl ? expEl.value.trim() : '';
  });
  showTitle();
}

// init
document.getElementById('total-q-label').textContent = quizData.length;
</script>
