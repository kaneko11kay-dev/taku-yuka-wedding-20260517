<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Wars風 自己紹介</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --yellow:#ffe81f; --blue:#4bd5ee; }

  html,body {
    width:100%; 
    height:100%;
    overflow:hidden;
    background:#000; /* 白フラッシュ防止のため黒固定 */
    font-family:"Yu Gothic",sans-serif;
    color:var(--yellow);
    z-index: 0;
  }

  /* ── 星空キャンバス ── */
  #starfield {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 1;
    background: transparent;
  }

  /* ── "far away..." テキスト ── */
  .intro {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: var(--blue);
    opacity: 0;
    z-index: 2;
    animation: intro 6s ease-out forwards;
  }
  @keyframes intro {
    0%  { opacity:0 }
    20% { opacity:1 }
    80% { opacity:1 }
    100%{ opacity:0 }
  }

  /* ── ロゴ ── */
  .logo-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
    perspective: 900px;
  }
  .logo-img {
    max-width: min(560px,80vw);
    max-height: 60vh;
    object-fit: contain;
    transform-origin: 50% 50%;
    will-change: transform, opacity;
    opacity: 0;
    animation: logoShrink 18s linear 6s forwards;
  }
  @keyframes logoShrink {
    0%   { opacity:1; transform:scale(4);    }
    60%  { opacity:1; transform:scale(0.9);  }
    85%  { opacity:1; transform:scale(0.25); }
    95%  { opacity:0.5; transform:scale(0.14); }
    100% { opacity:0; transform:scale(0.10); }
  }

  .fade-top {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 21%;
    background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 6;
    opacity: 0;
    animation: fadeTopIn 1s ease 23s forwards;
  }
  @keyframes fadeTopIn { from{opacity:0} to{opacity:1} }

  .crawl-scene {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 100%;
    transform: perspective(300px) rotateX(25deg);
    transform-origin: 50% 100%;
    z-index: 3;
    pointer-events: none;
  }

  .crawl {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    padding: 0 6%;
    text-align: center;
    font-size: 39px;
    font-weight: bold;
    line-height: 1.8;
    letter-spacing: 0.04em;
    opacity: 0;
    animation:
      crawlFadeIn  2s ease    23s forwards,
      crawlMove   70s linear  23s forwards;
  }

  .crawl h1 {
    font-size: 1.5em;
    margin-bottom: 0.5em;
    letter-spacing: 0.15em;
  }
  .crawl h2 {
    font-size: 1.15em;
    margin-bottom: 1em;
    letter-spacing: 0.12em;
  }
  .crawl p {
    margin-bottom: 1em;
  }

  @keyframes crawlFadeIn {
    from { opacity:0 }
    to   { opacity:1 }
  }
  @keyframes crawlMove {
    0%   { top:  100%; }
    100% { top: -320%; }
  }

  @media (max-width:600px) {
    .intro { font-size:20px; }
    .logo-img { max-height:50vh; }
    .crawl {
      font-size: 27px;
      padding: 0 4%;
      line-height: 1.6;
      animation:
        crawlFadeIn  2s ease    23s forwards,
        crawlMove   88s linear  23s forwards;
    }
  }

  /* ── スタート画面 ── */
  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: #000;
  }
  #start-screen .star-title {
    color: var(--yellow);
    font-size: 16px;
    letter-spacing: 0.35em;
    margin-bottom: 48px;
    opacity: 0.65;
    text-transform: uppercase;
  }
  #start-btn {
    padding: 18px 56px;
    border: 2px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    font-size: 20px;
    font-family: "Yu Gothic", sans-serif;
    letter-spacing: 0.25em;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.3s, color 0.3s;
  }
  #start-btn:hover { background: var(--yellow); color: #000; }

  /* ── 動画オーバーレイ ── */
  #video-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 90;
  }
  #video-screen.active { display: flex; }
  #intro-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     ── テロップ画面（ルカスフィルム風） ──
     動画終了後に2秒だけ表示される画面。
     文字は下記の <!-- TELOP: ～ --> コメントで変更可。
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  #telop-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 95;

    /* フェードイン・アウト用 */
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #telop-screen.active {
    display: flex;
  }
  #telop-screen.visible {
    opacity: 1;
  }

  /* テロップの文字スタイル（映画風の緑色） */
  .telop-line1 {
    color: #3ddc3d;           /* 緑色 */
    font-family: "Georgia", serif;
    font-size: clamp(14px, 2.5vw, 32px);
    font-weight: bold;
    letter-spacing: 0.08em;
    text-align: center;
    margin-bottom: 0.2em;
  }
  .telop-line2 {
    color: #3ddc3d;
    font-family: "Georgia", serif;
    font-size: clamp(20px, 4vw, 48px); /* 半分サイズ */
    font-weight: bold;
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 0.1em;
  }
  .telop-line3 {
    color: #3ddc3d;
    font-family: "Georgia", serif;
    font-size: clamp(14px, 2.5vw, 32px); /* 半分サイズ */
    font-weight: bold;
    letter-spacing: 0.08em;
    text-align: center;
  }

  /* ── メインコンテンツ ── */
  #main-content { display: none; width: 100%; height: 100%; }
  #main-content.active { display: block; }

  /* ── 音楽終了後ボタン ── */
  #end-btn {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    padding: 18px 56px;
    border: 2px solid var(--yellow);
    background: rgba(0,0,0,0.75);
    color: var(--yellow);
    font-size: 18px;
    font-family: "Yu Gothic", sans-serif;
    letter-spacing: 0.25em;
    cursor: pointer;
    border-radius: 3px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease, background 0.3s, color 0.3s;
    white-space: nowrap;
  }
  #end-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #end-btn:hover { background: var(--yellow); color: #000; }
</style>
</head>
<body>

<!-- ── スタートボタン ── -->
<div id="start-screen">
  <div class="star-title">「START」を押すと映像と音楽が再生されます</div>
  <button id="start-btn" onclick="startExperience()">▶ START</button>
</div>

<!-- ── 動画画面 ── -->
<div id="video-screen">
  <video id="intro-video" src="VideoProject1.mp4" playsinline></video>
</div>
<audio id="bg-audio" src="StarSound.mp3"></audio>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     テロップ画面
     ↓↓↓ 文字を変えたい場合はここを編集 ↓↓↓
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div id="telop-screen">
  <!-- TELOP LINE 1: 上段テキスト（例: "A"） -->
  <div class="telop-line1">A</div>

  <!-- TELOP LINE 2: 中段テキスト（例: "LUCASFILM LIMITED"） -->
  <div class="telop-line2">YUKASFILM LIMITED</div>

  <!-- TELOP LINE 3: 下段テキスト（例: "Production"） -->
  <div class="telop-line3">Production</div>
</div>
<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

<!-- ── 音楽終了後に表示するボタン ── -->
<!-- ↓↓↓ href の URL を変更してください ↓↓↓ -->
<a id="end-btn" href="index.html" target="_blank">🚀 ホームページに戻る</a>

<!-- ── メインコンテンツ（Star Wars クロール） ── -->
<div id="main-content">
<canvas id="starfield"></canvas>

<div class="fade-top"></div>

<div class="intro">遠い昔 はるかかなたの<br>
                   公園で・・・         </div>

<div class="logo-wrap">
  <img src="logo.png" alt="STAR WEDDING" class="logo-img">
</div>

<div class="crawl-scene">
  <div class="crawl">
    <h1>Takuto＆Yuka</h1>
    <h2>Weddingの夜明け</h2>
    <p>これは、スターウォー〇風のスクロールでお届けする、ささやかな余興です。</p>
    <p>まず本日は遠いところからお越し頂きありがとうございます。</p>
    <p>しかも1，2か月前とか急にも関わらず...</p>
    <p>にしても今日はこんなに晴れるとは、</p>
    <p>飲み物とか出ると思うのでじゃんじゃん飲んでください。</p>
    <p>とりあえず、これからもよろしくお願いします。</p>
    <p>それでは、銀河のどこかでまたお会いしましょう。</p>
  </div>
</div>
</div>

<script>
/* ---------- Start & Video ---------- */
function startExperience() {
  const startScreen  = document.getElementById('start-screen');
  const videoScreen  = document.getElementById('video-screen');
  const telopScreen  = document.getElementById('telop-screen');
  const video        = document.getElementById('intro-video');
  const audio        = document.getElementById('bg-audio');
  const mainContent  = document.getElementById('main-content');

  // スタート画面を非表示にして動画画面を表示
  startScreen.style.display = 'none';
  videoScreen.classList.add('active');

  // 音楽と動画を同時再生
  audio.play().catch(() => {});
  video.play().catch(() => {});

  // 音楽が終わったらボタンをフェードイン
  audio.addEventListener('ended', () => {
    const btn = document.getElementById('end-btn');
    btn.classList.add('visible');
  }, { once: true });

  // 動画が終わったらテロップ画面を表示
  video.addEventListener('ended', () => {
    // ── テロップを動画の上に即座に重ねて表示（白フラッシュ防止） ──
    telopScreen.classList.add('active');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        telopScreen.classList.add('visible');
        // テロップが前面に出てから動画をフェードアウト
        videoScreen.style.transition = 'opacity 0.5s ease';
        videoScreen.style.opacity = '0';
        setTimeout(() => { videoScreen.style.display = 'none'; }, 500);
      });
    });

    // 2秒後にテロップをフェードアウトして自己紹介へ遷移
    // ※ 表示時間を変えたい場合は下の 2000 (ms) を変更
    setTimeout(() => {
      telopScreen.style.transition = 'opacity 0.6s ease';
      telopScreen.style.opacity = '0';

      setTimeout(() => {
        telopScreen.style.display = 'none';

        // Star Wars クロールを表示
        mainContent.classList.add('active');
        resize();
        requestAnimationFrame(draw);
      }, 600); // フェードアウト完了待ち (ms)

    }, 2000); // ← テロップの表示時間 (ms)

  }, { once: true });
}
</script>

<script>
/* ---------- Starfield ---------- */
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, stars = [];
const dpr = Math.max(1, window.devicePixelRatio || 1);

function initStars(n = 320) {
  stars = Array.from({ length: n }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.2,
    alpha: Math.random(),
    speed: Math.random() * 1.6 + 0.4,
    phase: Math.random() * Math.PI * 2,
  }));
}

function resize() {
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  canvas.width  = Math.floor(window.innerWidth  * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = window.innerWidth;
  H = window.innerHeight;
  const area = (W * H) / (1366 * 768);
  initStars(Math.round(320 * Math.min(Math.max(area, 0.6), 2.0)));
}

function draw(timestamp) {
  const t = (timestamp || performance.now()) * 0.001;
  ctx.clearRect(0, 0, W, H);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(1, 'rgba(8,8,12,1)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    const raw  = Math.sin(t * s.speed + s.phase);
    const norm = (raw + 1) / 2;
    const a    = 0.2 + 0.8 * norm;
    const grd  = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3);
    grd.addColorStop(0,   `rgba(255,255,255,${a})`);
    grd.addColorStop(0.6, `rgba(255,255,255,${a * 0.35})`);
    grd.addColorStop(1,   `rgba(255,255,255,0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize, { passive: true });
</script>

</body>
</html>
